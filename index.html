<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCR Pro - Almas Solutions</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #f39c12; --bg: #f4f7f6; --gold: #d4af37; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; max-width: 500px; margin: auto; background: white; position: relative; }

        #preview-box { flex: 0 0 38%; background: #000; position: relative; overflow: hidden; transition: flex 0.4s ease; border-bottom: 2px solid var(--gold); }
        #preview-box.compact { flex: 0 0 15%; }
        #video, #image-to-crop { position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: contain; }
        #preview-box.compact #image-to-crop { object-fit: cover; }

        .focus-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 120px; border: 2px solid var(--warning); box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; display: none; border-radius: 8px; }
        #flash-btn { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }

        .controls-section { flex: 1; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        .btn { width: 90%; padding: 12px; margin: 4px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        .edit-field { width: 95%; padding: 8px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin: 4px auto; background: #fffbe6; text-align: center; display: block; }
        .phone-val { font-size: 28px; font-weight: bold; color: #d32f2f; text-align: center; margin: 4px auto; border: 2px dashed var(--primary); padding: 5px; border-radius: 10px; width: fit-content; min-width: 180px; background: white; }

        .mini-keyboard { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #eee; padding: 8px; border-radius: 12px; margin: 8px auto; width: 200px; }
        .key { background: white; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 18px; text-align: center; cursor: pointer; box-shadow: 0 2px 0 #bbb; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 95%; margin: 8px auto; }
        .action-grid .btn { width: 100%; margin: 0; padding: 10px; font-size: 14px; }
        .chips-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin: 4px 0; }
        .chip { background: #e9ecef; padding: 4px 10px; border-radius: 15px; font-size: 11px; cursor: pointer; border: 1px solid #ccc; }

        .footer-brand { width: 100%; background: #000; color: var(--gold); text-align: center; padding: 8px 0; font-size: 14px; font-weight: bold; position: absolute; bottom: 0; left: 0; z-index: 100; border-top: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="preview-box">
        <div id="flash-btn"><i class="fas fa-bolt"></i></div>
        <div id="focus-frame" class="focus-frame"></div>
        <video id="video" autoplay playsinline></video>
        <img id="image-to-crop">
    </div>

    <div class="controls-section">
        <div id="status">جاهز</div>

        <div id="init-btns" style="width: 100%;">
            <button class="btn btn-primary" id="btn-camera"><i class="fas fa-camera"></i> فتح الكاميرا</button>
            <label class="btn btn-primary" style="background:#6c757d; display: flex;" for="file-in"><i class="fas fa-image"></i> رفع صورة</label>
            <input type="file" id="file-in" accept="image/*" style="display:none;">
        </div>

        <div id="crop-btns" style="display:none; width: 100%;">
            <div style="background:#e2e8f0; padding:8px; border-radius:12px; margin: 5px auto; width: 90%;">
                <input type="range" id="rot-slider" min="-180" max="180" step="1" value="0" style="width:100%">
            </div>
            <button class="btn btn-success" id="btn-ocr"><i class="fas fa-search"></i> قراءة البيانات</button>
            <button class="btn btn-danger" onclick="location.reload()"><i class="fas fa-redo"></i> إعادة</button>
        </div>

        <div id="result-ui" style="display:none; width:100%;">
            <input type="text" id="name-input" class="edit-field" placeholder="اكتب اسم العميل هنا (اختياري)">
            <div class="phone-val" id="phone-display"></div>
            
            <button class="btn btn-warning" style="width:auto; padding:5px 20px; font-size:12px; margin:auto;" onclick="toggleKB()"><i class="fas fa-keyboard"></i> تعديل الرقم</button>

            <div id="mini-kb" class="mini-keyboard">
                <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
                <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
                <div class="key" style="background:#ff4d4d; color:white" onclick="press('X')"><i class="fas fa-backspace"></i></div><div class="key" onclick="press('0')">0</div><div class="key" style="background:#888; color:white" onclick="press('C')">C</div>
            </div>

            <div class="chips-container" id="chips"></div>
            <textarea id="msg-text" class="edit-field" rows="1" placeholder="رسالة الواتساب"></textarea>
            
            <div class="action-grid">
                <button class="btn btn-success" id="btn-wa"><i class="fab fa-whatsapp"></i> واتساب</button>
                <button class="btn btn-primary" id="btn-call"><i class="fas fa-phone"></i> اتصال</button>
                <button class="btn btn-warning" id="btn-vcf"><i class="fas fa-user-plus"></i> حفظ</button>
                <button class="btn btn-danger" onclick="location.reload()"><i class="fas fa-redo"></i> إعادة</button>
            </div>
        </div>
    </div>

    <div class="footer-brand">Almas Solutions®²⁰²٦</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let cropper, currentRot = 0, videoStream = null, track = null, flashOn = false;
    const img = document.getElementById('image-to-crop'), vid = document.getElementById('video');
    const phoneDisp = document.getElementById('phone-display'), nameInput = document.getElementById('name-input');
    const msgText = document.getElementById('msg-text'), chipsDiv = document.getElementById('chips');
    const previewBox = document.getElementById('preview-box'), statusTxt = document.getElementById('status');
    const flashBtn = document.getElementById('flash-btn'), focusFrame = document.getElementById('focus-frame');

    function arToEn(str) { return str.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)); }

    document.getElementById('btn-camera').onclick = async () => {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            vid.srcObject = videoStream; vid.style.display = "block"; focusFrame.style.display = "block";
            track = videoStream.getVideoTracks()[0];
            if (track.getCapabilities().torch) flashBtn.style.display = "flex";
            document.getElementById('btn-camera').innerHTML = '<i class="fas fa-circle"></i> التقاط';
            document.getElementById('btn-camera').onclick = takeSnapshot;
        } catch(e) { alert("يرجى تفعيل الكاميرا"); }
    };

    flashBtn.onclick = async () => {
        flashOn = !flashOn;
        await track.applyConstraints({ advanced: [{ torch: flashOn }] });
        flashBtn.style.color = flashOn ? "var(--warning)" : "white";
    };

    function takeSnapshot() {
        const c = document.createElement('canvas');
        c.width = vid.videoWidth; c.height = vid.videoHeight;
        c.getContext('2d').drawImage(vid, 0, 0);
        initCrop(c.toDataURL('image/png'));
        if (track) track.stop();
        vid.style.display = "none"; focusFrame.style.display = "none"; flashBtn.style.display = "none";
    }

    function initCrop(src) {
        img.src = src; img.style.display = "block";
        document.getElementById('init-btns').style.display = "none";
        document.getElementById('crop-btns').style.display = "block";
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { 
            viewMode: 1, autoCropArea: 1,
            ready() {
                const containerData = cropper.getContainerData();
                cropper.setCropBoxData({ left: containerData.width * 0.1, top: (containerData.height / 2) - 60, width: containerData.width * 0.8, height: 120 });
            }
        });
    }

    document.getElementById('rot-slider').oninput = function() {
        let a = parseInt(this.value); cropper.rotate(a - currentRot); currentRot = a;
    };

    document.getElementById('btn-ocr').onclick = () => {
        const canvas = cropper.getCroppedCanvas({ imageSmoothingHigh: true });
        statusTxt.innerText = "جاري القراءة... ⏳";
        previewBox.classList.add('compact'); 

        Tesseract.recognize(canvas.toDataURL(), 'eng+ara').then(({ data: { text } }) => {
            let cleanText = arToEn(text.replace(/[\s-]/g, ''));
            const p = cleanText.match(/01[0125][0-9]{8}/);
            
            // تعديل: ترك الاسم فارغاً دائماً
            nameInput.value = ""; 
            phoneDisp.innerText = p ? p[0] : "";
            
            document.getElementById('result-ui').style.display = "block";
            document.getElementById('crop-btns').style.display = "none";
            statusTxt.innerText = "تم بنجاح ✅";
            cropper.destroy();
            img.src = canvas.toDataURL();
            img.style.display = "block";
        });
    };

    function toggleKB() { const kb = document.getElementById('mini-kb'); kb.style.display = (kb.style.display === 'grid') ? 'none' : 'grid'; }
    window.press = (v) => { if (v === 'C') phoneDisp.innerText = ''; else if (v === 'X') phoneDisp.innerText = phoneDisp.innerText.slice(0, -1); else if (phoneDisp.innerText.length < 11) phoneDisp.innerText += v; };
    function renderChips() {
        chipsDiv.innerHTML = '';
        ["تم استلام الطلب.", "الطلب جاهز.", "الدليفري في الطريق."].forEach(m => {
            const c = document.createElement('div'); c.className = 'chip';
            c.innerText = m; c.onclick = () => msgText.value = m;
            chipsDiv.appendChild(c);
        });
    }
    document.getElementById('btn-wa').onclick = () => window.open(`https://wa.me/2${phoneDisp.innerText}?text=${encodeURIComponent(msgText.value)}`);
    document.getElementById('btn-call').onclick = () => window.location.href = `tel:${phoneDisp.innerText}`;
    document.getElementById('btn-vcf').onclick = () => {
        const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${nameInput.value || 'عميل'}\nTEL;TYPE=CELL:${phoneDisp.innerText}\nEND:VCARD`;
        const a = document.createElement('a'); a.download = `${nameInput.value || 'عميل'}.vcf`;
        a.href = URL.createObjectURL(new Blob([vcf], {type: "text/vcard"})); a.click();
    };
    renderChips();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
