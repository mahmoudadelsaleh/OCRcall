<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCR Call - Almas Solutions</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #f39c12; --bg: #f4f7f6; --gold: #d4af37; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; background: white; position: relative; }
        
        /* حاوية الصورة المتغيرة */
        #preview-box { flex: 0 0 35%; background: #000; position: relative; overflow: hidden; transition: flex 0.4s ease; }
        #preview-box.compact { flex: 0 0 20%; } /* تتقلص بعد القص */
        
        #video, #image-to-crop { position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: contain; }
        
        .focus-frame {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: 120px; border: 2px solid var(--warning);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; display: none; border-radius: 12px;
        }

        .controls-section { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        /* تقسيم الأزرار كما طلبت */
        .action-grid-custom { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            width: 95%; 
            margin-top: 10px;
            direction: ltr; /* لضمان ترتيب اليمين واليسار */
        }
        .right-side { display: flex; flex-direction: column; gap: 8px; } /* واتساب واتصال */
        .left-side { display: flex; flex-direction: column; gap: 8px; } /* حفظ وجديد */

        .edit-field { width: 95%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; margin: 5px 0; text-align: center; font-size: 18px; background: #fffbe6; }
        .phone-val { font-size: 28px; font-weight: bold; color: #d32f2f; margin: 5px 0; border: 2px dashed var(--primary); padding: 5px; border-radius: 10px; width: 100%; text-align: center;}

        .mini-keyboard { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #eee; padding: 10px; border-radius: 12px; margin: 5px auto; width: 220px; }
        .key { background: white; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 18px; text-align: center; cursor: pointer; }
        
        .chips-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin: 5px 0; width: 100%; }
        .chip { background: #e9ecef; padding: 6px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; }

        .footer-brand { width: 100%; background: #000; color: var(--gold); text-align: center; padding: 10px 0; font-size: 14px; font-weight: bold; position: absolute; bottom: 0; left: 0; border-top: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="preview-box">
        <div id="flash-toggle" style="position:absolute; top:10px; left:10px; z-index:10; background:rgba(0,0,0,0.5); border-radius:50%; width:40px; height:40px; display:none; align-items:center; justify-content:center; color:white; border:2px solid white; cursor:pointer;">⚡</div>
        <div id="focus-frame" class="focus-frame"></div>
        <video id="video" autoplay playsinline></video>
        <img id="image-to-crop" style="display:none;">
    </div>

    <div class="controls-section">
        <div id="status" style="color:var(--danger); font-weight:bold; margin-bottom:5px;"></div>

        <div id="init-btns" style="width:95%; display:flex; flex-direction:column; gap:10px;">
            <button class="btn btn-primary" id="btn-camera">📸 فتح الكاميرا</button>
            <label class="btn btn-primary" style="background:#6c757d; display:flex; align-items:center; justify-content:center;" for="file-in">📁 رفع صورة</label>
            <input type="file" id="file-in" accept="image/*" style="display:none;">
        </div>

        <div id="crop-btns" style="display:none; width:100%; text-align:center;">
            <input type="range" id="rot-slider" min="-180" max="180" step="1" value="0" style="width:90%; margin: 15px 0;">
            <button class="btn btn-success" id="btn-ocr">🔍 قراءة سريعة</button>
        </div>

        <div id="result-ui" style="display:none; width:100%; text-align:center;">
            <input type="text" id="name-input" class="edit-field" placeholder="الاسم">
            <div class="phone-val" id="phone-display"></div>
            
            <button class="btn btn-warning" style="width:auto; padding:5px 15px; font-size:12px;" onclick="toggleKB()">✏️ تعديل الرقم</button>

            <div id="mini-kb" class="mini-keyboard">
                <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
                <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
                <div class="key" style="background:#ff4d4d; color:white" onclick="press('X')">X</div><div class="key" onclick="press('0')">0</div><div class="key" style="background:#888; color:white" onclick="press('C')">C</div>
            </div>

            <div class="chips-container" id="chips"></div>
            
            <div class="action-grid-custom">
                <div class="right-side"> <button class="btn btn-success" id="btn-wa">💬 واتساب</button>
                    <button class="btn btn-primary" id="btn-call">📞 اتصال</button>
                </div>
                <div class="left-side"> <button class="btn btn-warning" id="btn-vcf">👤 حفظ الرقم</button>
                    <button class="btn btn-danger" onclick="location.reload()">🔄 جديد</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-brand">Almas Solutions®²٠٢٦</div>
</div>

<script>
    let cropper, currentRot = 0, track = null, flashOn = false;
    const img = document.getElementById('image-to-crop'), vid = document.getElementById('video');
    const phoneDisp = document.getElementById('phone-display'), nameInput = document.getElementById('name-input');
    const flashBtn = document.getElementById('flash-toggle'), focusFrame = document.getElementById('focus-frame'), previewBox = document.getElementById('preview-box');
    
    let savedMsgs = ["الدليفري في الطريق", "الطلب جاهز للاستلام"];

    function arToEn(str) { return str.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)); }

    document.getElementById('btn-camera').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            vid.srcObject = stream; vid.style.display = "block";
            focusFrame.style.display = "block";
            track = stream.getVideoTracks()[0];
            if (track.getCapabilities().torch) flashBtn.style.display = "flex";
            document.getElementById('btn-camera').innerText = "📸 التقاط";
            document.getElementById('btn-camera').onclick = () => {
                const c = document.createElement('canvas');
                c.width = vid.videoWidth; c.height = vid.videoHeight;
                c.getContext('2d').drawImage(vid, 0, 0);
                initCrop(c.toDataURL('image/png'));
                stream.getTracks().forEach(t => t.stop());
                vid.style.display = "none"; focusFrame.style.display = "none"; flashBtn.style.display = "none";
            };
        } catch(e) { alert("افتح الصلاحيات"); }
    };

    document.getElementById('file-in').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => initCrop(ev.target.result);
            reader.readAsDataURL(file);
        }
    };

    function initCrop(src) {
        img.src = src; img.style.display = "block";
        document.getElementById('init-btns').style.display = "none";
        document.getElementById('crop-btns').style.display = "block";
        if (cropper) cropper.destroy();
        setTimeout(() => {
            cropper = new Cropper(img, {
                viewMode: 1, autoCropArea: 0.6,
                ready() {
                    const cont = cropper.getContainerData();
                    cropper.setCropBoxData({ left: cont.width*0.12, top: (cont.height/2)-60, width: cont.width*0.75, height: 120 });
                }
            });
        }, 150);
    }

    document.getElementById('rot-slider').oninput = function() {
        let val = parseInt(this.value);
        cropper.rotate(val - currentRot);
        currentRot = val;
    };

    // تسريع القراءة
    document.getElementById('btn-ocr').onclick = async () => {
        const canvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
        document.getElementById('status').innerText = "جاري القراءة سريعة... ⚡";
        
        // تقليص الحاوية لإعطاء مساحة
        previewBox.classList.add('compact');

        const worker = await Tesseract.createWorker('ara+eng');
        const { data: { text } } = await worker.recognize(canvas.toDataURL());
        
        let cleanText = arToEn(text.replace(/[\s-]/g, ''));
        const p = cleanText.match(/01[0125][0-9]{8}/);
        phoneDisp.innerText = p ? p[0] : "";
        nameInput.value = text.split('\n')[0].trim() || "عميل";
        
        document.getElementById('result-ui').style.display = "block";
        document.getElementById('crop-btns').style.display = "none";
        document.getElementById('status').innerText = "";
        img.src = canvas.toDataURL();
        cropper.destroy();
        await worker.terminate();
    };

    function toggleKB() {
        const kb = document.getElementById('mini-kb');
        kb.style.display = (kb.style.display === 'grid') ? 'none' : 'grid';
    }
    window.press = (v) => {
        if (v === 'C') phoneDisp.innerText = '';
        else if (v === 'X') phoneDisp.innerText = phoneDisp.innerText.slice(0, -1);
        else if (phoneDisp.innerText.length < 11) phoneDisp.innerText += v;
    };

    document.getElementById('btn-wa').onclick = () => window.open(`https://wa.me/2${phoneDisp.innerText}`);
    document.getElementById('btn-call').onclick = () => window.location.href = `tel:${phoneDisp.innerText}`;
    document.getElementById('btn-vcf').onclick = () => {
        const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${nameInput.value}\nTEL;TYPE=CELL:${phoneDisp.innerText}\nEND:VCARD`;
        const a = document.createElement('a');
        a.download = `${nameInput.value}.vcf`;
        a.href = URL.createObjectURL(new Blob([vcf], {type: "text/vcard"}));
        a.click();
    };
</script>
</body>
</html>
