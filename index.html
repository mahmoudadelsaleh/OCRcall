<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OCRcall">
    <meta name="description" content="تحويل الصور إلى جهات اتصال - OCRcall من Almas Solutions">
    
    <title>OCRcall²⁰²⁶ | Almas Solutions</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --dark: #1C1C1E;
            --gray: #8E8E93;
            --light-gray: #F2F2F7;
            --gold: #D4AF37;
            --brown-dark: #5D4037;
        }

        body {
            background: var(--light-gray);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* شريط الحالة العلوي */
        .status-bar {
            background: var(--dark);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100;
        }

        .offline-indicator {
            display: none;
            background: var(--warning);
            color: var(--dark);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .offline-indicator.show {
            display: inline-block;
        }

        /* حاوية التطبيق الرئيسية */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            position: relative;
        }

        /* معاينة الكاميرا - بدون حاوية سوداء */
        .camera-preview {
            position: relative;
            background: transparent;
            overflow: visible;
            transition: all 0.3s ease;
            margin: 0;
            padding: 0;
        }

        /* الوضع الكامل (قبل الاقتصاص) */
        .camera-preview.full {
            height: 35vh;
            min-height: 180px;
            background: #000;
        }

        /* بعد الاقتصاص - الصورة ملتصقة بالسقف */
        .camera-preview.compact {
            height: auto;
            background: transparent;
            margin: 0;
            padding: 0;
            line-height: 0;
        }

        #video, #image-preview {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* في وضع المعاينة الكامل */
        .camera-preview.full #video,
        .camera-preview.full #image-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* بعد الاقتصاص - الصورة ملتصقة بالسقف بدون أي فراغات */
        .camera-preview.compact #image-preview {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            position: relative;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
            background: transparent;
        }

        /* إطار التركيز */
        .focus-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 80px;
            border: 2px solid var(--warning);
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* زر الفلاش */
        .flash-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: none;
        }

        /* منطقة التحكم */
        .controls {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--gray);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        /* حالة التطبيق */
        .status {
            text-align: center;
            padding: 8px;
            font-weight: 500;
            font-size: 13px;
            color: var(--primary);
            background: var(--light-gray);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* حقل الاسم */
        .name-field {
            position: relative;
            margin-bottom: 10px;
        }

        .name-field input {
            width: 100%;
            height: 44px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            background: #FFF9E6;
            padding: 0 35px;
            font-family: inherit;
        }

        .clear-name {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        /* رقم الهاتف */
        .phone-wrapper {
            position: relative;
            margin-bottom: 10px;
        }
        
        .phone-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--brown-dark);
            text-align: center;
            padding: 12px;
            background: var(--light-gray);
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .phone-number.editing {
            border-color: var(--primary);
            background: #FFF9E6;
        }
        
        .edit-phone-btn {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 2;
        }
        
        .edit-phone-btn.active {
            background: var(--danger);
            transform: translateY(-50%) rotate(180deg);
        }

        /* لوحة المفاتيح */
        .keyboard {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: var(--light-gray);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .keyboard.show {
            display: grid;
        }

        .key {
            background: white;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .key:active {
            transform: scale(0.95);
            background: #E5E5EA;
        }

        /* الشيبس */
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .chip {
            background: var(--light-gray);
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
        }

        /* حقل الرسالة */
        textarea {
            width: 100%;
            height: 70px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            padding: 8px;
            font-size: 13px;
            resize: none;
            margin-bottom: 10px;
            font-family: inherit;
        }

        /* أزرار الإجراءات */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: var(--light-gray);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* سجل المسح */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--dark);
        }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: var(--light-gray);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .history-number {
            font-weight: bold;
            color: var(--primary);
            margin-left: 5px;
            font-size: 12px;
        }

        .history-name {
            font-weight: bold;
            color: var(--dark);
            font-size: 13px;
        }

        .history-phone {
            color: var(--brown-dark);
            direction: ltr;
            display: inline-block;
            font-size: 13px;
            font-weight: bold;
        }

        .history-date {
            font-size: 10px;
            color: var(--gray);
            margin-top: 4px;
        }

        .history-message {
            font-size: 11px;
            color: var(--success);
            margin-top: 4px;
            font-style: italic;
        }

        .clear-cache-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
        }

        /* الفوتر - مرتفع وواضح */
        .footer {
            background: linear-gradient(135deg, var(--dark) 0%, #2a2a2e 100%);
            color: var(--gold);
            text-align: center;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: bold;
            border-top: 2px solid var(--gold);
            position: relative;
            margin-top: 5px;
        }

        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .footer-icon {
            font-size: 13px;
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 5px var(--gold); }
        }

        /* شاشة التحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: var(--danger);
            color: white;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- شريط الحالة -->
<div class="status-bar">
    <span>📱 OCRcall²⁰²⁶</span>
    <div class="offline-indicator" id="offlineIndicator">
        <i class="fas fa-wifi"></i> غير متصل
    </div>
</div>

<!-- حاوية التطبيق -->
<div class="app-container">
    <!-- معاينة الصورة/الكاميرا - بدون حاوية سوداء بعد الاقتصاص -->
    <div class="camera-preview full" id="cameraPreview">
        <button class="flash-btn" id="flashBtn" style="display: none;">
            <i class="fas fa-bolt"></i>
        </button>
        <div class="focus-frame" id="focusFrame"></div>
        <video id="video" autoplay playsinline></video>
        <img id="image-preview" style="display: none;" alt="Preview">
    </div>

    <div class="controls">
        <div class="status" id="status">
            <i class="fas fa-check-circle"></i> جاهز للاستخدام
        </div>
        <div class="error-message" id="errorMessage"></div>

        <!-- شاشة البداية -->
        <div id="startScreen">
            <button class="btn btn-primary" id="cameraBtn">
                <i class="fas fa-camera"></i> فتح الكاميرا
            </button>
            <label class="btn btn-secondary" for="imageUpload">
                <i class="fas fa-image"></i> رفع صورة
            </label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            <button class="btn btn-secondary" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
        </div>

        <!-- شاشة القص -->
        <div id="cropScreen" style="display: none;">
            <input type="range" id="rotateSlider" min="-180" max="180" step="1" value="0" style="width: 100%; margin-bottom: 8px;">
            <button class="btn btn-success" id="ocrBtn">
                <i class="fas fa-search"></i> قراءة البيانات
            </button>
            <button class="btn btn-danger" id="cancelBtn">
                <i class="fas fa-times"></i> إلغاء
            </button>
        </div>

        <!-- شاشة النتائج مع التبويبات -->
        <div id="resultScreen" style="display: none;">
            <div class="tabs">
                <div class="tab active" data-tab="main">📝 رئيسي</div>
                <div class="tab" data-tab="history">📋 السجل</div>
            </div>

            <!-- المحتوى الرئيسي -->
            <div id="mainTab" class="tab-content active">
                <button class="btn btn-secondary" id="retryOcrBtn" style="display: none;">
                    <i class="fas fa-redo-alt"></i> محاولة مرة أخرى
                </button>

                <div class="name-field">
                    <input type="text" id="customerName" placeholder="اسم العميل" autocomplete="off">
                    <button class="clear-name" onclick="document.getElementById('customerName').value = ''">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="phone-wrapper">
                    <div class="phone-number" id="phoneNumber"></div>
                    <button class="edit-phone-btn" id="editPhoneBtn">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>

                <div class="keyboard" id="keyboard">
                    <div class="key" onclick="window.addDigit('9')">9</div>
                    <div class="key" onclick="window.addDigit('8')">8</div>
                    <div class="key" onclick="window.addDigit('7')">7</div>
                    <div class="key" onclick="window.addDigit('6')">6</div>
                    <div class="key" onclick="window.addDigit('5')">5</div>
                    <div class="key" onclick="window.addDigit('4')">4</div>
                    <div class="key" onclick="window.addDigit('3')">3</div>
                    <div class="key" onclick="window.addDigit('2')">2</div>
                    <div class="key" onclick="window.addDigit('1')">1</div>
                    <div class="key" style="background: var(--danger); color: white;" onclick="window.deleteDigit()">
                        <i class="fas fa-backspace"></i>
                    </div>
                    <div class="key" onclick="window.addDigit('0')">0</div>
                    <div class="key" style="background: var(--gray); color: white;" onclick="window.clearPhone()">
                        C
                    </div>
                </div>

                <div class="chips">
                    <div class="chip" onclick="window.setQuickMessage('✅ تم استلام طلبك بنجاح')">📦 استلام</div>
                    <div class="chip" onclick="window.setQuickMessage('🚚 طلبك جاهز للتسليم')">✅ جاهز</div>
                    <div class="chip" onclick="window.setQuickMessage('🛵 المندوب في الطريق إليك')">🚚 بالطريق</div>
                    <div class="chip" onclick="window.setQuickMessage('🎉 تم التوصيل شكراً لك')">🎁 تم التوصيل</div>
                </div>

                <textarea id="messageInput" placeholder="📝 رسالة مخصصة..."></textarea>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="callBtn">
                        <i class="fas fa-phone"></i> اتصال
                    </button>
                    <button class="btn btn-success" id="whatsappBtn">
                        <i class="fab fa-whatsapp"></i> واتساب
                    </button>
                    <button class="btn btn-warning" id="saveContactBtn">
                        <i class="fas fa-user-plus"></i> حفظ
                    </button>
                    <button class="btn btn-info" id="saveToHistoryBtn">
                        <i class="fas fa-save"></i> حفظ بالسجل
                    </button>
                    <button class="btn btn-danger" id="newBtn">
                        <i class="fas fa-redo-alt"></i> جديد
                    </button>
                </div>
            </div>

            <!-- سجل المسح -->
            <div id="historyTab" class="tab-content">
                <div class="history-header">
                    <span class="history-title">📋 سجل المسح اليومي</span>
                    <button class="clear-cache-btn" id="clearHistoryBtn">
                        <i class="fas fa-trash"></i> مسح الكاش
                    </button>
                </div>
                <div id="historyList" class="history-list">
                    <div style="text-align: center; padding: 20px; color: var(--gray);">
                        لا توجد بيانات في السجل
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- فوتر مرتفع وواضح -->
    <div class="footer">
        <div class="footer-content">
            <i class="fas fa-crown footer-icon"></i>
            <span>Almas Solutions<sup>®</sup>²⁰²⁶</span>
            <span style="font-size: 9px; background: rgba(212,175,55,0.2); padding: 2px 6px; border-radius: 10px;">PWA</span>
        </div>
    </div>
</div>

<!-- شاشة تحميل -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
        <div class="spinner"></div>
        <p id="loadingText">جاري التحميل...</p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
    let cropper = null;
    let currentRotation = 0;
    let mediaStream = null;
    let torchEnabled = false;
    let lastImageData = null;
    let tesseractReady = false;
    let db = null;
    let nextId = 1;
    let isEditingPhone = false;
    
    const video = document.getElementById('video');
    const imagePreview = document.getElementById('image-preview');
    const cameraPreview = document.getElementById('cameraPreview');
    const focusFrame = document.getElementById('focusFrame');
    const flashBtn = document.getElementById('flashBtn');
    const statusDiv = document.getElementById('status');
    const errorMessageDiv = document.getElementById('errorMessage');
    const startScreen = document.getElementById('startScreen');
    const cropScreen = document.getElementById('cropScreen');
    const resultScreen = document.getElementById('resultScreen');
    const phoneDisplay = document.getElementById('phoneNumber');
    const customerNameInput = document.getElementById('customerName');
    const messageInput = document.getElementById('messageInput');
    const retryOcrBtn = document.getElementById('retryOcrBtn');
    const rotateSlider = document.getElementById('rotateSlider');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const offlineIndicator = document.getElementById('offlineIndicator');
    const loadingText = document.getElementById('loadingText');
    const historyList = document.getElementById('historyList');
    const keyboard = document.getElementById('keyboard');
    const editPhoneBtn = document.getElementById('editPhoneBtn');

    function togglePhoneEditing() {
        isEditingPhone = !isEditingPhone;
        if (isEditingPhone) {
            keyboard.classList.add('show');
            phoneDisplay.classList.add('editing');
            editPhoneBtn.classList.add('active');
            editPhoneBtn.innerHTML = '<i class="fas fa-check"></i>';
        } else {
            keyboard.classList.remove('show');
            phoneDisplay.classList.remove('editing');
            editPhoneBtn.classList.remove('active');
            editPhoneBtn.innerHTML = '<i class="fas fa-edit"></i>';
        }
    }

    phoneDisplay.onclick = () => togglePhoneEditing();
    editPhoneBtn.onclick = (e) => { e.stopPropagation(); togglePhoneEditing(); };

    function openDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('OCRcallDB', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                const tx = db.transaction(['scans'], 'readonly');
                const store = tx.objectStore('scans');
                const cursor = store.openCursor(null, 'prev');
                cursor.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) nextId = cursor.value.id + 1;
                    resolve();
                };
            };
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('scans')) {
                    const store = db.createObjectStore('scans', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('date', 'date');
                }
            };
        });
    }

    async function saveScan(name, phone, message) {
        if (!phone) { showError('لا يوجد رقم هاتف للحفظ'); return false; }
        const scan = {
            id: nextId++, name: name || 'عميل', phone: phone, message: message || '',
            date: new Date().toISOString(), dateFormatted: new Date().toLocaleString('ar-EG')
        };
        return new Promise((resolve, reject) => {
            const tx = db.transaction(['scans'], 'readwrite');
            const store = tx.objectStore('scans');
            const request = store.add(scan);
            request.onsuccess = () => { statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ تم حفظ البيانات'; loadHistory(); resolve(true); };
            request.onerror = () => { showError('فشل حفظ البيانات'); reject(request.error); };
        });
    }

    async function loadHistory() {
        if (!db) return;
        return new Promise((resolve) => {
            const tx = db.transaction(['scans'], 'readonly');
            const store = tx.objectStore('scans');
            const index = store.index('date');
            const scans = [];
            index.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) { scans.push(cursor.value); cursor.continue(); }
                else { displayHistory(scans); resolve(scans); }
            };
        });
    }

    function displayHistory(scans) {
        if (!historyList) return;
        if (scans.length === 0) { historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--gray);">📭 لا توجد بيانات</div>'; return; }
        historyList.innerHTML = scans.map(scan => `
            <div class="history-item" onclick="window.loadScanToMain(${scan.id})">
                <div><span class="history-number">#${scan.id}</span><span class="history-name">${escapeHtml(scan.name)}</span></div>
                <div class="history-phone">📞 ${scan.phone}</div>
                ${scan.message ? `<div class="history-message">💬 ${escapeHtml(scan.message.substring(0, 50))}${scan.message.length > 50 ? '...' : ''}</div>` : ''}
                <div class="history-date">📅 ${scan.dateFormatted}</div>
            </div>
        `).join('');
    }

    window.loadScanToMain = function(id) {
        const tx = db.transaction(['scans'], 'readonly');
        const store = tx.objectStore('scans');
        const request = store.get(id);
        request.onsuccess = () => {
            const scan = request.result;
            if (scan) {
                customerNameInput.value = scan.name;
                phoneDisplay.innerText = scan.phone;
                messageInput.value = scan.message || '';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ تم التحميل';
                document.querySelector('.tab[data-tab="main"]').click();
            }
        };
    };

    async function clearAllCache() {
        if (confirm('⚠️ هل أنت متأكد من مسح جميع بيانات السجل؟')) {
            const tx = db.transaction(['scans'], 'readwrite');
            const store = tx.objectStore('scans');
            store.clear().onsuccess = () => { nextId = 1; loadHistory(); statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> 🗑️ تم مسح الكاش'; showError('تم مسح جميع البيانات'); };
        }
    }

    function showError(message) {
        errorMessageDiv.style.display = 'block';
        errorMessageDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
        setTimeout(() => { errorMessageDiv.style.display = 'none'; }, 3000);
    }

    function arabicToEnglish(str) { return str.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)); }
    function extractPhoneNumber(text) { const match = arabicToEnglish(text.replace(/[\s\-\(\)]/g, '')).match(/01[0125][0-9]{8}/); return match ? match[0] : ''; }
    function extractName(text) { const lines = text.split('\n'); for (let line of lines) { line = line.trim(); if (line.length > 2 && line.length < 30 && !/[0-9]/.test(line)) return line; } return ''; }
    
    function showLoading(show, text = 'جاري التحميل...') { if (show) { loadingText.textContent = text; loadingOverlay.style.display = 'flex'; } else { loadingOverlay.style.display = 'none'; } }

    async function performOCR(imageData) {
        if (!tesseractReady) { showError('محرك OCR قيد التحميل'); return; }
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري القراءة...';
        retryOcrBtn.style.display = 'none';
        let timeout = setTimeout(() => {
            if (statusDiv.innerHTML !== '✅ تم القراءة') {
                statusDiv.innerHTML = '⚠️ انتهى الوقت، أدخل يدوياً';
                keyboard.classList.add('show');
                retryOcrBtn.style.display = 'block';
            }
        }, 8000);
        try {
            showLoading(true, 'جاري معالجة الصورة...');
            const { data: { text } } = await Tesseract.recognize(imageData, 'ara+eng');
            clearTimeout(timeout);
            showLoading(false);
            const phone = extractPhoneNumber(text);
            const name = extractName(text);
            if (phone) {
                phoneDisplay.innerText = phone;
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ تم العثور على الرقم';
                keyboard.classList.remove('show');
                isEditingPhone = false;
                editPhoneBtn.classList.remove('active');
                editPhoneBtn.innerHTML = '<i class="fas fa-edit"></i>';
            } else {
                phoneDisplay.innerText = '';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ لم يتم العثور على رقم';
                keyboard.classList.add('show');
                retryOcrBtn.style.display = 'block';
            }
            if (name) customerNameInput.value = name;
        } catch (error) {
            clearTimeout(timeout);
            showLoading(false);
            statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> ❌ فشل القراءة';
            keyboard.classList.add('show');
            retryOcrBtn.style.display = 'block';
            showError('حدث خطأ');
        }
    }

    function cropAndOCR() {
        if (!cropper) { showError('لم يتم تحميل الصورة'); return; }
        try {
            const canvas = cropper.getCroppedCanvas();
            const imageData = canvas.toDataURL('image/png');
            lastImageData = imageData;
            
            // تغيير شكل الحاوية - الصورة تلتصق بالسقف بدون خلفية سوداء
            cameraPreview.classList.remove('full');
            cameraPreview.classList.add('compact');
            imagePreview.src = imageData;
            imagePreview.style.display = 'block';
            video.style.display = 'none';
            // إزالة الخلفية السوداء
            cameraPreview.style.background = 'transparent';
            
            if (cropper) { cropper.destroy(); cropper = null; }
            cropScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            performOCR(imageData);
        } catch (error) { console.error(error); showError('حدث خطأ'); }
    }

    function initCropper(imageSrc) {
        try {
            imagePreview.src = imageSrc;
            imagePreview.style.display = 'block';
            video.style.display = 'none';
            focusFrame.style.display = 'none';
            startScreen.style.display = 'none';
            cropScreen.style.display = 'block';
            if (cropper) cropper.destroy();
            imagePreview.onload = () => {
                cropper = new Cropper(imagePreview, { viewMode: 1, autoCropArea: 0.7, movable: true, zoomable: true, rotatable: true });
                setTimeout(() => { if (cropper) { const containerData = cropper.getContainerData(); cropper.setCropBoxData({ top: containerData.height * 0.2 }); } }, 100);
            };
            if (imagePreview.complete) imagePreview.onload();
        } catch (error) { showError('خطأ في أداة القص'); }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            mediaStream = stream;
            video.srcObject = stream;
            video.style.display = 'block';
            imagePreview.style.display = 'none';
            focusFrame.style.display = 'block';
            const track = stream.getVideoTracks()[0];
            if (track.getCapabilities().torch) flashBtn.style.display = 'flex';
            const cameraBtn = document.getElementById('cameraBtn');
            cameraBtn.innerHTML = '<i class="fas fa-camera"></i> 📸 التقاط صورة';
            cameraBtn.onclick = capturePhoto;
            statusDiv.innerHTML = '<i class="fas fa-camera"></i> الكاميرا جاهزة';
        } catch (error) { statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ❌ لا يمكن الوصول للكاميرا'; showError('صلاحية الكاميرا مطلوبة'); }
    }

    function capturePhoto() {
        if (!video.videoWidth) { showError('الكاميرا غير جاهزة'); return; }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
        initCropper(canvas.toDataURL('image/png'));
    }

    async function toggleFlash() {
        if (!mediaStream) return;
        const track = mediaStream.getVideoTracks()[0];
        torchEnabled = !torchEnabled;
        await track.applyConstraints({ advanced: [{ torch: torchEnabled }] });
        flashBtn.style.background = torchEnabled ? 'var(--warning)' : 'rgba(0,0,0,0.7)';
    }

    window.addDigit = function(d) { if (isEditingPhone && phoneDisplay.innerText.length < 11) phoneDisplay.innerText += d; };
    window.deleteDigit = function() { if (isEditingPhone) phoneDisplay.innerText = phoneDisplay.innerText.slice(0, -1); };
    window.clearPhone = function() { if (isEditingPhone) phoneDisplay.innerText = ''; };
    window.setQuickMessage = function(m) { messageInput.value = m; };

    function resetApp() {
        if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
        cameraPreview.classList.remove('compact');
        cameraPreview.classList.add('full');
        cameraPreview.style.background = '#000';
        video.style.display = 'block';
        imagePreview.style.display = 'none';
        focusFrame.style.display = 'block';
        startScreen.style.display = 'block';
        cropScreen.style.display = 'none';
        resultScreen.style.display = 'none';
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> جاهز للاستخدام';
        const cameraBtn = document.getElementById('cameraBtn');
        cameraBtn.innerHTML = '<i class="fas fa-camera"></i> فتح الكاميرا';
        cameraBtn.onclick = startCamera;
        flashBtn.style.display = 'none';
        torchEnabled = false;
        phoneDisplay.innerText = '';
        customerNameInput.value = '';
        messageInput.value = '';
        isEditingPhone = false;
        keyboard.classList.remove('show');
        editPhoneBtn.classList.remove('active');
        editPhoneBtn.innerHTML = '<i class="fas fa-edit"></i>';
    }

    function updateOfflineStatus() { offlineIndicator.classList.toggle('show', !navigator.onLine); }
    async function initTesseract() {
        showLoading(true, 'جاري تحميل OCR...');
        try { tesseractReady = true; showLoading(false); statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ جاهز'; }
        catch (error) { showLoading(false); statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ وضع الإدخال اليدوي'; tesseractReady = false; }
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`${tabName}Tab`).classList.add('active');
            if (tabName === 'history') loadHistory();
        });
    });

    document.getElementById('callBtn').onclick = () => { const p = phoneDisplay.innerText; if (p && p.length >= 10) window.location.href = `tel:${p}`; else showError('رقم غير صحيح'); };
    document.getElementById('whatsappBtn').onclick = () => { const p = phoneDisplay.innerText; const m = messageInput.value || 'مرحباً'; if (p && p.length >= 10) window.open(`https://wa.me/2${p}?text=${encodeURIComponent(m)}`); else showError('رقم غير صحيح'); };
    document.getElementById('saveContactBtn').onclick = () => {
        const name = customerNameInput.value || 'عميل';
        const phone = phoneDisplay.innerText;
        if (!phone || phone.length < 10) { showError('لا يوجد رقم صحيح'); return; }
        const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL;TYPE=CELL:${phone}\nEND:VCARD`;
        const blob = new Blob([vcf], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `${name}.vcf`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✅ تم حفظ جهة الاتصال';
    };
    document.getElementById('saveToHistoryBtn').onclick = async () => { await saveScan(customerNameInput.value, phoneDisplay.innerText, messageInput.value); };
    document.getElementById('clearHistoryBtn').onclick = clearAllCache;
    document.getElementById('newBtn').onclick = resetApp;
    document.getElementById('cancelBtn').onclick = resetApp;
    document.getElementById('refreshBtn').onclick = () => location.reload();
    retryOcrBtn.onclick = () => { if (lastImageData) performOCR(lastImageData); };
    rotateSlider.oninput = function() { if (cropper) { const r = parseInt(this.value); cropper.rotate(r - currentRotation); currentRotation = r; } };
    document.getElementById('ocrBtn').onclick = cropAndOCR;
    document.getElementById('imageUpload').onchange = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = (ev) => initCropper(ev.target.result); reader.readAsDataURL(file); } };
    flashBtn.onclick = toggleFlash;
    document.getElementById('cameraBtn').onclick = startCamera;

    window.addEventListener('online', updateOfflineStatus);
    window.addEventListener('offline', updateOfflineStatus);
    window.addEventListener('error', function(e) { if (e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT') e.preventDefault(); }, true);

    async function init() { await openDatabase(); await loadHistory(); updateOfflineStatus(); initTesseract(); }
    init();
</script>
</body>
</html>
