<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCR Pro - Almas Solutions</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #f39c12; --bg: #f4f7f6; --gold: #d4af37; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; background: white; position: relative; }

        #preview-box { flex: 0 0 35%; background: #000; position: relative; overflow: hidden; border-bottom: 2px solid var(--gold); }
        #preview-box.compact { flex: 0 0 15%; }
        #video, #image-to-crop { position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: contain; }
        #preview-box.compact #image-to-crop { object-fit: cover; }

        .focus-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 100px; border: 2px solid var(--warning); box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 5; pointer-events: none; display: none; border-radius: 8px; }
        #flash-btn { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; }

        /* ضبط الأزرار بمقاسات موحدة تماماً */
        .controls-section { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; }
        .btn { 
            width: 90%; 
            height: 50px; /* مقاس ثابت للكل */
            margin: 6px 0; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            box-sizing: border-box;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-dark { background: #333; color: white; }

        .name-container { position: relative; width: 90%; margin: 5px auto; }
        .edit-field { width: 100%; height: 45px; border: 1px solid #ccc; border-radius: 12px; font-size: 16px; text-align: center; background: #fffbe6; box-sizing: border-box; }
        .clear-name { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: var(--danger); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }

        .phone-val { font-size: 32px; font-weight: bold; color: #d32f2f; text-align: center; margin: 10px auto; border: 2px dashed var(--primary); padding: 5px; border-radius: 12px; min-width: 200px; background: white; }
        
        .chips-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 10px 0; width: 95%; }
        .chip { background: #e9ecef; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #ccc; }

        .mini-keyboard { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #eee; padding: 10px; border-radius: 12px; margin: 5px auto; width: 240px; }
        .key { background: white; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 18px; text-align: center; cursor: pointer; box-shadow: 0 2px 0 #bbb; }

        /* الأزرار الأربعة: يمين (اتصال/واتساب) يسار (حفظ/جديد) */
        .action-grid-custom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin: 10px auto; }
        .side-group { display: flex; flex-direction: column; gap: 8px; }
        .side-group .btn { width: 100%; margin: 0; }

        /* الفوتر الذهبي - تثبيت مطلق */
        .footer-brand { 
            width: 100%; background: #000; color: var(--gold); text-align: center; 
            padding: 15px 0; font-size: 14px; font-weight: bold; 
            position: absolute; bottom: 0; left: 0; z-index: 1000; 
            border-top: 2px solid var(--gold); letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="preview-box">
        <div id="flash-btn"><i class="fas fa-bolt"></i></div>
        <div id="focus-frame" class="focus-frame"></div>
        <video id="video" autoplay playsinline></video>
        <img id="image-to-crop" style="display:none;">
    </div>

    <div class="controls-section">
        <div id="status" style="font-weight:bold; color:var(--primary); margin-bottom:5px;">جاهز</div>

        <div id="init-btns" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <button class="btn btn-primary" id="btn-camera"><i class="fas fa-camera"></i> فتح الكاميرا</button>
            <label class="btn btn-gray" for="file-in"><i class="fas fa-image"></i> رفع صورة</label>
            <input type="file" id="file-in" accept="image/*" style="display:none;">
            <button class="btn btn-dark" onclick="location.reload()"><i class="fas fa-sync-alt"></i> إعادة تحميل التطبيق</button>
        </div>

        <div id="crop-btns" style="display:none; width: 100%; text-align:center;">
            <input type="range" id="rot-slider" min="-180" max="180" step="1" value="0" style="width:90%; margin: 10px 0;">
            <button class="btn btn-success" id="btn-ocr"><i class="fas fa-search"></i> قراءة البيانات (٦ ثوانٍ)</button>
            <button class="btn btn-danger" style="width:90%; margin:auto;" onclick="location.reload()">🔄 إلغاء</button>
        </div>

        <div id="result-ui" style="display:none; width:100%;">
            <button id="retry-btn" class="btn btn-primary" style="display:none; background:#0056b3; width:90%; margin:5px auto;"><i class="fas fa-redo-alt"></i> محاولة مرة أخرى</button>

            <div class="name-container">
                <input type="text" id="name-input" class="edit-field" placeholder="اسم العميل">
                <button class="clear-name" onclick="document.getElementById('name-input').value=''"><i class="fas fa-times"></i></button>
            </div>

            <div class="phone-val" id="phone-display"></div>
            
            <div id="mini-kb" class="mini-keyboard">
                <div class="key" onclick="press('9')">9</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('7')">7</div>
                <div class="key" onclick="press('6')">6</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('4')">4</div>
                <div class="key" onclick="press('3')">3</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('1')">1</div>
                <div class="key" style="background:#ff4d4d; color:white" onclick="press('X')"><i class="fas fa-backspace"></i></div><div class="key" onclick="press('0')">0</div><div class="key" style="background:#888; color:white" onclick="press('C')">C</div>
            </div>

            <div class="chips-container">
                <div class="chip" onclick="msg('تم استلام طلبك.')">استلام</div>
                <div class="chip" onclick="msg('الطلب جاهز للتسليم.')">جاهز</div>
                <div class="chip" onclick="msg('الدليفري في الطريق.')">بالطريق</div>
            </div>
            <textarea id="msg-box" class="edit-field" style="height:45px; margin-bottom:10px;" placeholder="رسالة الواتساب..."></textarea>

            <div class="action-grid-custom">
                <div class="side-group"> <button class="btn btn-primary" id="btn-call"><i class="fas fa-phone"></i> اتصال</button>
                    <button class="btn btn-success" id="btn-wa"><i class="fab fa-whatsapp"></i> واتساب</button>
                </div>
                <div class="side-group"> <button class="btn btn-warning" id="btn-vcf" style="color:white;"><i class="fas fa-user-plus"></i> حفظ</button>
                    <button class="btn btn-danger" onclick="location.reload()"><i class="fas fa-redo"></i> جديد</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-brand">
        Almas Solutions®²٠٢٦
    </div>
</div>

<script>
    let cropper, currentRot = 0, track = null, flashOn = false, lastImg = null;
    const img = document.getElementById('image-to-crop'), vid = document.getElementById('video');
    const phoneDisp = document.getElementById('phone-display'), nameInput = document.getElementById('name-input'), statusTxt = document.getElementById('status');
    const msgBox = document.getElementById('msg-box'), retryBtn = document.getElementById('retry-btn');

    function arToEn(str) { return str.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)); }
    function msg(m) { msgBox.value = m; }

    document.getElementById('btn-camera').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        vid.srcObject = stream; vid.style.display = "block"; document.getElementById('focus-frame').style.display = "block";
        track = stream.getVideoTracks()[0];
        if (track.getCapabilities().torch) document.getElementById('flash-btn').style.display = "flex";
        document.getElementById('btn-camera').innerHTML = '<i class="fas fa-circle"></i> التقاط';
        document.getElementById('btn-camera').onclick = () => {
            const c = document.createElement('canvas');
            c.width = vid.videoWidth; c.height = vid.videoHeight;
            c.getContext('2d').drawImage(vid, 0, 0);
            initCrop(c.toDataURL('image/png'));
            stream.getTracks().forEach(t => t.stop());
            vid.style.display = "none"; document.getElementById('focus-frame').style.display = "none";
        };
    };

    document.getElementById('flash-btn').onclick = async () => {
        flashOn = !flashOn; await track.applyConstraints({ advanced: [{ torch: flashOn }] });
    };

    document.getElementById('file-in').onchange = (e) => {
        const r = new FileReader(); r.onload = (ev) => initCrop(ev.target.result); r.readAsDataURL(e.target.files[0]);
    };

    function initCrop(src) {
        img.src = src; img.style.display = "block";
        document.getElementById('init-btns').style.display = "none";
        document.getElementById('crop-btns').style.display = "block";
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, autoCropArea: 0.9 });
    }

    document.getElementById('rot-slider').oninput = function() {
        let a = parseInt(this.value); cropper.rotate(a - currentRot); currentRot = a;
    };

    document.getElementById('btn-ocr').onclick = startOCR;
    retryBtn.onclick = startOCR;

    function startOCR() {
        const data = cropper ? cropper.getCroppedCanvas().toDataURL() : lastImg;
        if (cropper) { lastImg = data; document.getElementById('preview-box').classList.add('compact'); cropper.destroy(); cropper = null; img.src = data; }
        
        statusTxt.innerText = "جاري القراءة (٦ ثوانٍ)... ⏳";
        retryBtn.style.display = "none";

        let done = false;
        setTimeout(() => {
            if (!done) {
                statusTxt.innerText = "فشل التعرف - اكتب يدوياً ⚠️";
                document.getElementById('result-ui').style.display = "block";
                document.getElementById('mini-kb').style.display = "grid";
                retryBtn.style.display = "block";
            }
        }, 6000);

        Tesseract.recognize(data, 'eng+ara').then(({ data: { text } }) => {
            done = true;
            let clean = arToEn(text.replace(/[\s-]/g, ''));
            const p = clean.match(/01[0125][0-9]{8}/);
            phoneDisp.innerText = p ? p[0] : "";
            
            let extractedName = text.split('\n').find(l => l.trim().length > 3 && !l.match(/[0-9]/)) || "";
            nameInput.value = extractedName.trim();

            document.getElementById('result-ui').style.display = "block";
            document.getElementById('crop-btns').style.display = "none";
            statusTxt.innerText = p ? "تم ✅" : "لم يتم العثور على رقم";
            if (!p) retryBtn.style.display = "block";
        });
    }

    function press(v) {
        if (v === 'C') phoneDisp.innerText = '';
        else if (v === 'X') phoneDisp.innerText = phoneDisp.innerText.slice(0, -1);
        else if (phoneDisp.innerText.length < 11) phoneDisp.innerText += v;
    }

    document.getElementById('btn-wa').onclick = () => window.open(`https://wa.me/2${phoneDisp.innerText}?text=${encodeURIComponent(msgBox.value)}`);
    document.getElementById('btn-call').onclick = () => window.location.href = `tel:${phoneDisp.innerText}`;
    document.getElementById('btn-vcf').onclick = () => {
        const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${nameInput.value || 'عميل'}\nTEL;TYPE=CELL:${phoneDisp.innerText}\nEND:VCARD`;
        const a = document.createElement('a'); a.download = `${nameInput.value || 'عميل'}.vcf`;
        a.href = URL.createObjectURL(new Blob([vcf], {type: "text/vcard"})); a.click();
    };
</script>
</body>
</html>
