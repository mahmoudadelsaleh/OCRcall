<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1C1C1E">
    <title>Wide-Scan OCR 2026 | Almas Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007AFF; --gold: #D4AF37; --success: #34C759; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: system-ui; overflow: hidden; position: fixed; width: 100%; height: 100%; color: white; }

        .camera-layer { position: absolute; inset: 0; z-index: 1; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* طبقة المسح المستطيلة المطورة */
        .scanner-overlay {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .scan-window {
            width: 85%; /* زيادة العرض */
            height: 100px; /* تقليل الارتفاع */
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 12px; position: relative; 
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            transition: all 0.3s;
        }
        .scan-window.found { border-color: var(--success); border-width: 4px; box-shadow: 0 0 20px var(--success), 0 0 0 2000px rgba(0,0,0,0.5); }
        
        .laser {
            position: absolute; width: 100%; height: 2px; background: var(--gold);
            top: 0; left: 0; box-shadow: 0 0 12px var(--gold);
            animation: scanning 1.5s infinite ease-in-out;
        }
        @keyframes scanning { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        /* عناصر التحكم العلوية */
        .top-tools {
            position: absolute; top: 45px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 25px; z-index: 10;
        }
        .tool-btn { background: rgba(0,0,0,0.6); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; }

        /* شريط الزوم (التقريب) */
        .zoom-container {
            position: absolute; bottom: 120px; width: 80%; left: 10%; z-index: 10;
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5);
            padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px);
        }
        #zoomSlider { flex: 1; accent-color: var(--gold); }

        /* اللوحة السفلية */
        .bottom-sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
            background: white; color: black; border-radius: 25px 25px 0 0;
            padding: 20px; transform: translateY(100%); transition: transform 0.4s ease;
            max-width: 500px; margin: auto;
        }
        .bottom-sheet.show { transform: translateY(0); }
        .phone-result { font-size: 35px; font-weight: 900; text-align: center; color: var(--primary); margin: 10px 0; letter-spacing: 2px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 16px; border: none; border-radius: 15px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-call { background: var(--primary); color: white; }
        .btn-wa { background: var(--success); color: white; }
        .btn-close { background: #eee; color: #333; grid-column: span 2; }

        #status { position: absolute; top: 100px; width: 100%; text-align: center; z-index: 5; font-size: 13px; color: var(--gold); }
    </style>
</head>
<body>

<div class="top-tools">
    <button class="tool-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
    <button class="tool-btn" id="flashBtn"><i class="fas fa-bolt"></i></button>
</div>

<div id="status">جاري تهيئة الماسح العريض...</div>

<div class="camera-layer">
    <video id="video" autoplay playsinline></video>
</div>

<div class="scanner-overlay">
    <div class="scan-window" id="window">
        <div class="laser"></div>
    </div>
    <p style="margin-top: 25px; font-size: 14px; opacity: 0.8;">ضع الرقم داخل المستطيل الذهبي</p>
</div>

<div class="zoom-container" id="zoomUI" style="display:none;">
    <i class="fas fa-search-minus"></i>
    <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1">
    <i class="fas fa-search-plus"></i>
</div>

<div class="bottom-sheet" id="sheet">
    <div style="text-align:center; color:#666; font-size:12px; font-weight:bold;">✨ تم الالتقاط بنجاح</div>
    <div class="phone-result" id="resPhone">--------</div>
    
    <div class="btn-grid">
        <button class="btn btn-call" id="btnCall"><i class="fas fa-phone"></i> اتصال</button>
        <button class="btn btn-wa" id="btnWA"><i class="fab fa-whatsapp"></i> واتساب</button>
        <button class="btn btn-close" onclick="closeSheet()">مسح رقم آخر</button>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let worker = null;
    let stream = null;
    let track = null;
    let isScanning = true;
    let lastFound = "";

    async function init() {
        worker = await Tesseract.createWorker('ara+eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
        document.getElementById('status').innerText = "✅ مستعد للمسح التلقائي";
        startCamera();
    }

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            const video = document.getElementById('video');
            video.srcObject = stream;
            track = stream.getVideoTracks()[0];

            // تفعيل واجهة الزوم إذا كان الجهاز يدعمها
            const caps = track.getCapabilities();
            if (caps.zoom) {
                const zUI = document.getElementById('zoomUI');
                zUI.style.display = 'flex';
                const slider = document.getElementById('zoomSlider');
                slider.min = caps.zoom.min;
                slider.max = caps.zoom.max;
                slider.step = caps.zoom.step;
                slider.oninput = (e) => {
                    track.applyConstraints({ advanced: [{ zoom: e.target.value }] });
                };
            }

            requestAnimationFrame(scanLoop);
        } catch (e) {
            alert("خطأ: تأكد من تفعيل الكاميرا وبروتوكول HTTPS");
        }
    }

    async function scanLoop() {
        if (!isScanning) return;

        const video = document.getElementById('video');
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvas = document.getElementById('helperCanvas');
            const ctx = canvas.getContext('2d');

            // حساب أبعاد المنطقة المستطيلة العريضة بدقة
            const scaleX = video.videoWidth / window.innerWidth;
            const scaleY = video.videoHeight / window.innerHeight;
            
            const scanW = (window.innerWidth * 0.85) * scaleX;
            const scanH = 100 * scaleY;
            const scanX = (video.videoWidth - scanW) / 2;
            const scanY = (video.videoHeight - scanH) / 2;

            canvas.width = scanW;
            canvas.height = scanH;
            
            ctx.drawImage(video, scanX, scanY, scanW, scanH, 0, 0, scanW, scanH);

            const { data: { text } } = await worker.recognize(canvas);
            const match = text.replace(/\s/g, '').match(/01[0125][0-9]{8}/);

            if (match) {
                onFound(match[0]);
            }
        }
        if (isScanning) setTimeout(scanLoop, 400); // سرعة مسح عالية
    }

    function onFound(phone) {
        if (phone === lastFound) return;
        isScanning = false;
        lastFound = phone;
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // اهتزاز مميز عند النجاح

        document.getElementById('window').classList.add('found');
        document.getElementById('resPhone').innerText = phone;
        document.getElementById('sheet').classList.add('show');
    }

    window.closeSheet = () => {
        document.getElementById('sheet').classList.remove('show');
        document.getElementById('window').classList.remove('found');
        lastFound = "";
        isScanning = true;
        scanLoop();
    };

    document.getElementById('btnCall').onclick = () => window.location.href = `tel:${lastFound}`;
    document.getElementById('btnWA').onclick = () => window.open(`https://wa.me/2${lastFound}`);
    
    document.getElementById('flashBtn').onclick = async () => {
        if (track) {
            const state = track.getSettings().torch;
            await track.applyConstraints({ advanced: [{ torch: !state }] });
        }
    };

    init();
</script>
</body>
</html>
