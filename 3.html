<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1C1C1E">
    <title>Wide-Scan OCR | Almas Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007AFF; --gold: #D4AF37; --success: #34C759; --dark: #1C1C1E; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: system-ui, -apple-system; overflow: hidden; position: fixed; width: 100%; height: 100%; color: white; }

        /* منطقة الفيديو */
        .camera-container { position: absolute; inset: 0; z-index: 1; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* واجهة المسح (المستطيل العريض) */
        .overlay {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .scan-box {
            width: 85%; height: 110px; border: 2px solid rgba(212,175,55,0.5);
            border-radius: 15px; position: relative;
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); /* تعتيم ما حول المستطيل */
            transition: all 0.3s ease;
        }
        .scan-box.success { border-color: var(--success); border-width: 4px; box-shadow: 0 0 25px var(--success), 0 0 0 5000px rgba(0,0,0,0.4); }

        /* خط الليزر الذهبي */
        .laser-line {
            position: absolute; width: 90%; height: 2px; background: var(--gold);
            left: 5%; top: 10%; box-shadow: 0 0 15px var(--gold);
            animation: scanAnim 1.8s infinite ease-in-out;
        }
        @keyframes scanAnim { 0%, 100% { top: 10%; opacity: 0.5; } 50% { top: 85%; opacity: 1; } }

        /* الأزرار العلوية */
        .header-tools {
            position: absolute; top: 40px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; z-index: 10;
        }
        .circle-btn {
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 48px; height: 48px; border-radius: 50%; font-size: 20px;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }

        /* سـلايـدر الـتـقـريـب (Zoom Slider) */
        .zoom-panel {
            position: absolute; bottom: 130px; width: 80%; left: 10%; z-index: 10;
            background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 30px;
            display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #zoomRange { flex: 1; accent-color: var(--gold); height: 6px; cursor: pointer; }

        /* اللوحة السفلية للنتائج */
        .result-sheet {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
            background: white; color: var(--dark); border-radius: 25px 25px 0 0;
            padding: 25px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            max-width: 500px; margin: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .result-sheet.active { transform: translateY(0); }
        .res-title { text-align: center; color: #888; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .phone-num { font-size: 38px; font-weight: 900; text-align: center; color: var(--primary); letter-spacing: 2px; margin-bottom: 20px; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { 
            padding: 16px; border: none; border-radius: 15px; font-weight: 800; 
            font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-call { background: var(--primary); color: white; }
        .btn-wa { background: var(--success); color: white; }
        .btn-retry { background: #eee; color: #555; grid-column: span 2; margin-top: 5px; }

        #status-bar { position: absolute; top: 100px; width: 100%; text-align: center; z-index: 5; font-size: 13px; color: var(--gold); font-weight: 500; }
    </style>
</head>
<body>

<div class="header-tools">
    <button class="circle-btn" onclick="location.reload()"><i class="fas fa-redo"></i></button>
    <button class="circle-btn" id="flashToggle"><i class="fas fa-bolt"></i></button>
</div>

<div id="status-bar">جاري تشغيل محرك Almas الذكي...</div>

<div class="camera-container">
    <video id="video" autoplay playsinline></video>
</div>

<div class="overlay">
    <div class="scan-box" id="scanBox">
        <div class="laser-line"></div>
    </div>
    <p style="margin-top: 25px; font-size: 14px; opacity: 0.7; font-weight: 500;">ضع رقم الهاتف داخل الإطار الذهبي</p>
</div>

<div class="zoom-panel" id="zoomUI" style="display:none;">
    <i class="fas fa-minus" style="font-size: 12px;"></i>
    <input type="range" id="zoomRange" min="1" max="1" step="0.1" value="1">
    <i class="fas fa-plus" style="font-size: 12px;"></i>
</div>

<div class="result-sheet" id="resSheet">
    <div class="res-title">✨ تم التقاط الرقم تلقائياً</div>
    <div class="phone-num" id="displayPhone">--------</div>
    
    <div class="actions">
        <button class="action-btn btn-call" id="callNow"><i class="fas fa-phone"></i> اتصال</button>
        <button class="action-btn btn-wa" id="waNow"><i class="fab fa-whatsapp"></i> واتساب</button>
        <button class="action-btn btn-retry" onclick="restartScan()">مسح رقم جديد</button>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let worker = null;
    let stream = null;
    let videoTrack = null;
    let scanningActive = true;
    let detectedPhone = "";

    // 1. تشغيل المحرك (OCR)
    async function setupOCR() {
        worker = await Tesseract.createWorker('ara+eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
        document.getElementById('status-bar').innerText = "✅ الماسح جاهز ومستعد";
        startLiveCamera();
    }

    // 2. تشغيل الكاميرا وإعداد الزوم
    async function startLiveCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            const videoEl = document.getElementById('video');
            videoEl.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];

            // إعداد السلايدر (Zoom)
            const caps = videoTrack.getCapabilities();
            if (caps.zoom) {
                document.getElementById('zoomUI').style.display = 'flex';
                const zSlider = document.getElementById('zoomRange');
                zSlider.min = caps.zoom.min;
                zSlider.max = caps.zoom.max;
                zSlider.step = caps.zoom.step;
                zSlider.value = caps.zoom.min;
                zSlider.oninput = (e) => {
                    videoTrack.applyConstraints({ advanced: [{ zoom: e.target.value }] });
                };
            }

            requestAnimationFrame(processFrame);
        } catch (err) {
            alert("يرجى التأكد من تشغيل HTTPS والسماح بالكاميرا");
        }
    }

    // 3. حلقة المعالجة التلقائية (بدون تصوير يدوي)
    async function processFrame() {
        if (!scanningActive) return;

        const video = document.getElementById('video');
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');

            // حساب أبعاد القص للمستطيل العريض
            const scaleX = video.videoWidth / window.innerWidth;
            const scaleY = video.videoHeight / window.innerHeight;
            const cw = (window.innerWidth * 0.85) * scaleX;
            const ch = 110 * scaleY;
            const cx = (video.videoWidth - cw) / 2;
            const cy = (video.videoHeight - ch) / 2;

            canvas.width = cw;
            canvas.height = ch;
            ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

            const { data: { text } } = await worker.recognize(canvas);
            const found = text.replace(/\s/g, '').match(/01[0125][0-9]{8}/);

            if (found) {
                onSuccess(found[0]);
            }
        }
        if (scanningActive) setTimeout(processFrame, 450); // سرعة معالجة متوازنة
    }

    function onSuccess(phone) {
        if (phone === detectedPhone) return;
        scanningActive = false;
        detectedPhone = phone;
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // اهتزاز النجاح

        document.getElementById('scanBox').classList.add('success');
        document.getElementById('displayPhone').innerText = phone;
        document.getElementById('resSheet').classList.add('active');
    }

    window.restartScan = () => {
        document.getElementById('resSheet').classList.remove('active');
        document.getElementById('scanBox').classList.remove('success');
        detectedPhone = "";
        scanningActive = true;
        processFrame();
    };

    document.getElementById('callNow').onclick = () => window.location.href = `tel:${detectedPhone}`;
    document.getElementById('waNow').onclick = () => window.open(`https://wa.me/2${detectedPhone}`);
    
    // زر الفلاش
    document.getElementById('flashToggle').onclick = async () => {
        if (videoTrack) {
            const isFlashOn = videoTrack.getSettings().torch;
            await videoTrack.applyConstraints({ advanced: [{ torch: !isFlashOn }] });
        }
    };

    setupOCR();
</script>

<header style="width: 100%; display: flex; justify-content: center; padding: 10px 0; background: #2c3e50;">
    <a href="0.html" style="
        text-decoration: none;
        color: white;
        background: #e74c3c;
        padding: 5px 20px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 0.9rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    ">🏠 القائمة الرئيسية</a>
</header>

</body>
</html>
